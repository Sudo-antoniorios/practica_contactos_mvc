<VirtualHost *:80>
    ServerName contactos-mvc.local
    DocumentRoot "C:/xampp/htdocs/Servidor/contactos_mvc/public"

    <Directory "C:/xampp/htdocs/Servidor/contactos_mvc/public">
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "logs/contactos_mvc_error.log"
    CustomLog "logs/contactos_mvc_access.log" common
</VirtualHost>
